<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Your Personal Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #f1f0f5;
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(124,58,237,0.12), transparent 70%);
    pointer-events: none;
  }
  .header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 10;
  }
  .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 10px rgba(124,58,237,0.4); }
    50% { box-shadow: 0 0 25px rgba(124,58,237,0.8); }
  }
  .header-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    background: linear-gradient(90deg, #c084fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: #9b99b0; margin-top: 2px;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 85%;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .msg.user .msg-avatar { background: rgba(255,255,255,0.1); }
  .bubble {
    padding: 11px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    background: #1c1c26;
    border: 1px solid rgba(255,255,255,0.07);
    color: #f1f0f5;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border: none;
    color: white;
  }
  .typing { display: flex; gap: 5px; padding: 14px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #7c3aed;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }
  .chips {
    padding: 10px 16px 0;
    display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(124,58,237,0.1);
    color: #c084fc;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip:hover { background: rgba(124,58,237,0.3); border-color: #7c3aed; }
  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid rgba(255,255,255,0.07);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
  }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1;
    background: #1c1c26;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 12px 16px;
    color: #f1f0f5;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    outline: none;
    line-height: 1.5;
    transition: border 0.2s;
  }
  textarea:focus { border-color: #7c3aed; }
  textarea::placeholder { color: #5c5a72; }
  .send-btn, .mic-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .send-btn {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
  }
  .mic-btn {
    background: #1c1c26;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 22px;
  }
  .mic-btn.recording {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    border: none;
    animation: micPulse 1s infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
  }
  .send-btn:hover, .mic-btn:hover { transform: scale(1.08); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">✨</div>
  <div class="header-info">
    <h1>JARVIS</h1>
    <div class="status">
      <div class="dot"></div>
      Online — Hamesha Tumhare Saath
    </div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="msg">
    <div class="msg-avatar">✨</div>
    <div class="bubble">Heyy! 😊 Main JARVIS hoon — tumhara personal assistant! Type karo ya mic pe click karke bolo — main sun raha hoon! 💜</div>
  </div>
</div>

<div class="chips">
  <button class="chip" onclick="quickSend('Mujhe motivate karo')">💪 Motivate karo</button>
  <button class="chip" onclick="quickSend('Aaj ka plan banao')">📅 Plan banao</button>
  <button class="chip" onclick="quickSend('Mera mood thoda off hai')">😔 Baat karni hai</button>
  <button class="chip" onclick="quickSend('Kuch naya sikhao mujhe')">📚 Kuch sikhao</button>
  <button class="chip" onclick="quickSend('Ek joke sunao')">😄 Joke sunao</button>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice se bolo">🎤</button>
    <textarea id="input" placeholder="Kuch bhi poochho ya mic dabao..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
  </div>
</div>

<script>
  let history = [];
  let recognition = null;
  let isRecording = false;
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');

  // Speech Recognition Setup
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'hi-IN';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      input.value = text;
      autoResize(input);
      stopMic();
      send();
    };

    recognition.onerror = () => stopMic();
    recognition.onend = () => stopMic();
  }

  function toggleMic() {
    if (!recognition) {
      alert('Tumhara browser voice support nahi karta. Chrome use karo!');
      return;
    }
    if (isRecording) {
      stopMic();
    } else {
      startMic();
    }
  }

  function startMic() {
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.innerHTML = '⏹️';
    micBtn.title = 'Rok lo';
    recognition.start();
  }

  function stopMic() {
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.innerHTML = '🎤';
    micBtn.title = 'Voice se bolo';
    try { recognition.stop(); } catch(e) {}
  }

  // Text to Speech
 function speak(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'hi-IN';
      utter.rate = 1.0;
      utter.pitch = 0.7;  // Male voice
      utter.volume = 1;

      // Male voice dhundho
      const voices = window.speechSynthesis.getVoices();
      const maleVoice = voices.find(v =>
        v.lang.includes('hi') && v.name.toLowerCase().includes('male')
      ) || voices.find(v =>
        v.name.toLowerCase().includes('male')
      );
      if (maleVoice) utter.voice = maleVoice;

      window.speechSynthesis.speak(utter);
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function quickSend(text) {
    input.value = text;
    send();
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg' + (role === 'user' ? ' user' : '');
    div.innerHTML = `
      <div class="msg-avatar">${role === 'user' ? '🧑' : '✨'}</div>
      <div class="bubble">${text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg';
    div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar">✨</div>
      <div class="bubble typing">
        <span></span><span></span><span></span>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(-10) })
      });

      const data = await res.json();
      removeTyping();
      addMsg('assistant', data.reply);
      history.push({ role: 'assistant', content: data.reply });

      // JARVIS bhi bolta hai!
      speak(data.reply);

    } catch (err) {
      removeTyping();
      addMsg('assistant', 'Kuch problem aayi — dobara try karo! 💜');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
